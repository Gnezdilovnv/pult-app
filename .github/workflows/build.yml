name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/gradle-build-action@v3
      - name: Build APK with full output
        run: |
          ./gradlew assembleDebug --stacktrace --info
      - name: Find APK
        run: |
          find . -type f -name "*.apk" -exec ls -la {} \;
          APK_PATH=$(find . -type f -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          fi
      - name: Upload APK
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: p2p-json-hub
          path: ${{ steps.find_apk.outputs.apk_path }}
      - name: Debug directory
        if: steps.find_apk.outputs.apk_path == ''
        run: |
          echo "=== Полная структура app/build ==="
          find app/build -type f -ls || echo "app/build не существует"
          echo "=== Проверка gradle ==="
          ./gradlew projects
          ./gradlew tasks
