name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/gradle-build-action@v3
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace
      - name: List all output files
        run: |
          echo "=== Listing all APK files ==="
          find . -name "*.apk" -ls || echo "No APK files found"
          echo "=== Listing app/build directory ==="
          ls -la app/build/ || echo "app/build not found"
          echo "=== Listing app/build/outputs ==="
          ls -la app/build/outputs/ || echo "app/build/outputs not found"
          echo "=== Checking Gradle tasks ==="
          ./gradlew tasks --all
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: p2p-json-hub
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/*/*.apk
            **/*.apk
          if-no-files-found: warn
